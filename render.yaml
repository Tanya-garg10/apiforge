services:
  - type: web
    name: apiforge-backend
    env: node
    plan: free # Deploys on Render's free tier
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: GEMINI_API_KEY
        sync: true # Prompts the user to provide the Gemini key on deploy
